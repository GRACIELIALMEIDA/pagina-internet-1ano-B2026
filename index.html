<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Página Simples</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    header {
      background-color: #333;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background-color: #444;
      padding: 10px;
      text-align: center;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    main {
      display: flex;
      padding: 20px;
      gap: 20px;
    }

    section {
      flex: 3;
      background: #f4f4f4;
      padding: 15px;
    }

    aside {
      flex: 1;
      background: #ddd;
      padding: 15px;
    }

    footer {
      background-color: #333;
      color: white;
      text-align: center;
      padding: 10px;
      position: relative;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>

<body>

  <header>
    <h1>Minha Página</h1>
  </header>

  <nav>
    <a href="#">Início</a>
    <a href="#">Sobre</a>
    <a href="#">Contato</a>
  </nav>

  <main>
    <section>
      <h2>Conteúdo Principal</h2>
      <p>Aqui fica o conteúdo da página.</p>
    </section>

    <aside>
      <h3>Barra lateral</h3>
      <p>Informações extras aqui.</p>
    </aside>
  </main>

  <footer>
    <p>&copy; 2026 Minha Página</p>
  </footer>

</body>
</html>c
